kind = "video"
previewPath = "/resilium-demo-video/"
title = "Resilium Demo Video"
version = "1.0.0"
id = "artifacts/resilium-demo-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/resilium-demo-video/" ]
localPort = 19088

[services.development]
run = "pnpm --filter @workspace/resilium-demo-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resilium-demo-video", "run", "build" ]
publicDir = "artifacts/resilium-demo-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19088"
BASE_PATH = "/resilium-demo-video/"
