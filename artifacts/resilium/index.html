<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://clerk.resilium-platform.com https://cloud.umami.is; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://img.clerk.com https://resilium-platform.com; connect-src 'self' https://clerk.resilium-platform.com wss://clerk.resilium-platform.com https://*.clerk.com https://o4511187075923968.ingest.de.sentry.io https://cloud.umami.is https://api-gateway.umami.dev; frame-src https://clerk.resilium-platform.com https://*.clerk.accounts.dev https://cloud.umami.is; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';" />

    <!-- Primary meta — per-page titles/descriptions/canonicals are set by React via react-helmet-async -->
    <title>Resilium — Know Your Readiness. Build Your Resilience.</title>
    <meta name="description" content="Resilium gives you an objective resilience score across 6 dimensions — financial, health, skills, mobility, psychological, and resources — plus a personalized action plan. Free assessment in under 5 minutes." />
    <meta name="keywords" content="personal resilience, emergency preparedness, resilience score, financial resilience, crisis planning, preparedness assessment" />
    <meta name="author" content="Resilium" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (defaults; overridden per-page by react-helmet-async) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Resilium" />
    <meta property="og:title" content="Resilium — Know Your Readiness. Build Your Resilience." />
    <meta property="og:description" content="Resilium gives you an objective resilience score across 6 dimensions and a personalized action plan. Free assessment in under 5 minutes." />
    <meta property="og:image" content="https://resilium-platform.com/opengraph.jpg" />

    <!-- Twitter / X Card (defaults; overridden per-page by react-helmet-async) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Resilium — Know Your Readiness. Build Your Resilience." />
    <meta name="twitter:description" content="Resilium gives you an objective resilience score across 6 dimensions and a personalized action plan. Free assessment in under 5 minutes." />
    <meta name="twitter:image" content="https://resilium-platform.com/opengraph.jpg" />

    <!-- Theme -->
    <meta name="theme-color" content="#E08040" />

    <!-- canonical and og:url are set per-page by react-helmet-async; no fallback here to avoid all routes claiming to be the homepage -->
    <meta property="og:locale" content="en_US" />

    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts — Inter (body) + Playfair Display (coaching page headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap">

    <!-- Structured data — WebSite + Organization (visible to all crawlers immediately) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://resilium-platform.com/#website",
          "url": "https://resilium-platform.com/",
          "name": "Resilium",
          "description": "Personal resilience scoring and action-planning platform across 6 dimensions: financial, health, skills, mobility, psychological, and resources.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://resilium-platform.com/?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://resilium-platform.com/#organization",
          "url": "https://resilium-platform.com/",
          "name": "Resilium",
          "logo": {
            "@type": "ImageObject",
            "url": "https://resilium-platform.com/logo.png"
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer support",
            "email": "contact_resilium@pm.me"
          }
        }
      ]
    }
    </script>

  <!-- Redirect legacy replit.app domain to canonical domain -->
  <script src="/redirect.js"></script>

  <!-- Umami Analytics — cookieless, GDPR-friendly, no consent banner needed -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="c5f820b3-31df-42c7-9c67-2d669117f9b6"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
