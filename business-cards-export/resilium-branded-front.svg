<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="88.9mm" height="50.8mm" viewBox="0 0 1050 600">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E08040"/>
      <stop offset="100%" stop-color="#c96a28"/>
    </linearGradient>
    <radialGradient id="cornerGlow" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#E08040" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E08040" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="card">
      <rect width="1050" height="600" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card)">
    <!-- Background -->
    <rect width="1050" height="600" fill="#0D1225"/>

    <!-- Corner glow -->
    <circle cx="1050" cy="600" r="320" fill="url(#cornerGlow)"/>

    <!-- Top accent gradient line -->
    <rect x="0" y="0" width="1050" height="9" fill="url(#accentGrad)"/>

    <!-- ── Logo icon (scaled from 32×32 viewBox → ~88px square) ── -->
    <g transform="translate(72, 68) scale(2.75)">
      <circle cx="16" cy="16" r="13.5" stroke="#E08040" stroke-width="1.5" fill="none" opacity="0.4"/>
      <path d="M9 22 L16 8 L23 22" stroke="#E08040" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="16" cy="22" r="2.2" fill="#E08040"/>
    </g>

    <!-- Logo wordmark -->
    <text x="172" y="127"
          font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
          font-size="52" font-weight="700" fill="#EAD9BE" letter-spacing="0.5">Resilium</text>

    <!-- Tagline -->
    <text x="174" y="155"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="19" font-weight="400" fill="#E08040" letter-spacing="3.8">PERSONAL RESILIENCE PLATFORM</text>

    <!-- ── Name block (lower third) ── -->

    <!-- Full name -->
    <text x="72" y="412"
          font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
          font-size="44" font-weight="700" fill="#EAD9BE">Miruna Cristiana Paun</text>

    <!-- Title -->
    <text x="72" y="450"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="22" font-weight="500" fill="#E08040" letter-spacing="3.2">FOUNDER &amp; CEO</text>

    <!-- Divider -->
    <rect x="72" y="468" width="88" height="3" fill="#E08040" opacity="0.5"/>

    <!-- Email icon + text -->
    <rect x="72" y="490" width="18" height="13" rx="2" fill="none" stroke="#EAD9BE" stroke-width="1.5" opacity="0.45"/>
    <path d="M72 490 L81 499 L90 490" fill="none" stroke="#EAD9BE" stroke-width="1.5" opacity="0.45"/>
    <text x="100" y="503"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="22" fill="#EAD9BE" opacity="0.7">contact_resilium@pm.me</text>

    <!-- Web icon + text -->
    <circle cx="81" cy="531" r="9" fill="none" stroke="#EAD9BE" stroke-width="1.5" opacity="0.45"/>
    <line x1="81" y1="522" x2="81" y2="540" stroke="#EAD9BE" stroke-width="1" opacity="0.45"/>
    <line x1="72" y1="531" x2="90" y2="531" stroke="#EAD9BE" stroke-width="1" opacity="0.45"/>
    <path d="M75 524 Q81 529 87 524" fill="none" stroke="#EAD9BE" stroke-width="1" opacity="0.45"/>
    <path d="M75 538 Q81 533 87 538" fill="none" stroke="#EAD9BE" stroke-width="1" opacity="0.45"/>
    <text x="100" y="537"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="22" fill="#EAD9BE" opacity="0.7">resilium-platform.com</text>
  </g>
</svg>
