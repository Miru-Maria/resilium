<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="88.9mm" height="50.8mm" viewBox="0 0 1050 600">
  <defs>
    <clipPath id="card">
      <rect width="1050" height="600" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card)">
    <!-- Background — brand orange -->
    <rect width="1050" height="600" fill="#E08040"/>

    <!-- Subtle texture: large ghost circle top-left -->
    <circle cx="0" cy="0" r="280" fill="#ffffff" opacity="0.06"/>
    <!-- Large ghost circle bottom-right -->
    <circle cx="1050" cy="600" r="320" fill="#c96a28" opacity="0.25"/>

    <!-- Center content group -->
    <!-- Logo wordmark -->
    <text x="525" y="258"
          font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
          font-size="88" font-weight="700" fill="#0D1225"
          text-anchor="middle" letter-spacing="1">Resilium</text>

    <!-- Thin divider -->
    <rect x="493" y="278" width="64" height="2" fill="#0D1225" opacity="0.3"/>

    <!-- Tagline -->
    <text x="525" y="326"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="22" font-weight="500" fill="#0D1225" opacity="0.65"
          text-anchor="middle" letter-spacing="5">RESILIENCE — MEASURED. STRENGTHENED.</text>

    <!-- URL -->
    <text x="525" y="370"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="22" font-weight="500" fill="#0D1225" opacity="0.7"
          text-anchor="middle" letter-spacing="2">resilium-platform.com</text>
  </g>
</svg>
