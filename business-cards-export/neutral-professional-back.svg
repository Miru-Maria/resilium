<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="88.9mm" height="50.8mm" viewBox="0 0 1050 600">
  <defs>
    <clipPath id="card">
      <rect width="1050" height="600" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card)">
    <!-- Background — deep navy -->
    <rect width="1050" height="600" fill="#1a1a2e"/>

    <!-- Ghost initials watermark -->
    <text x="525" y="380"
          font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
          font-size="360" font-weight="700" fill="#ffffff" opacity="0.05"
          text-anchor="middle" dominant-baseline="middle">MCP</text>

    <!-- Name -->
    <text x="525" y="262"
          font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
          font-size="54" font-weight="700" fill="#ffffff"
          text-anchor="middle" letter-spacing="0.5">Miruna Cristiana Paun</text>

    <!-- Divider -->
    <rect x="493" y="282" width="64" height="2" fill="#ffffff" opacity="0.2"/>

    <!-- URL -->
    <text x="525" y="330"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="23" font-weight="400" fill="#ffffff" opacity="0.5"
          text-anchor="middle" letter-spacing="2.5">resilium-platform.com</text>
  </g>
</svg>
