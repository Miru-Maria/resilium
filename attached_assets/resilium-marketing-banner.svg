<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <!-- Glow filter for brain icon -->
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtler glow for nodes -->
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glass panel gradient -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Phone screen gradient -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#12192E"/>
      <stop offset="100%" stop-color="#080F1A"/>
    </linearGradient>
    <!-- Gauge gradient -->
    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D47235"/>
      <stop offset="100%" stop-color="#F0A050"/>
    </linearGradient>
    <!-- Center ambient glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E08040" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#E08040" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="1200" height="675" fill="#0D1225"/>

  <!-- ─── Ambient orange glow around centre icon ─── -->
  <ellipse cx="600" cy="225" rx="260" ry="200" fill="url(#ambientGlow)"/>

  <!-- ─── Neural network lines ─── -->
  <!-- Top ribbon -->
  <line x1="100" y1="42"  x2="310" y2="78"  stroke="#E08040" stroke-width="0.7" stroke-opacity="0.28"/>
  <line x1="310" y1="78"  x2="520" y2="52"  stroke="#7890D8" stroke-width="0.7" stroke-opacity="0.22"/>
  <line x1="520" y1="52"  x2="718" y2="62"  stroke="#E08040" stroke-width="0.7" stroke-opacity="0.22"/>
  <line x1="718" y1="62"  x2="925" y2="38"  stroke="#7890D8" stroke-width="0.7" stroke-opacity="0.22"/>
  <line x1="925" y1="38"  x2="1105" y2="68" stroke="#E08040" stroke-width="0.7" stroke-opacity="0.28"/>
  <line x1="1105" y1="68" x2="1178" y2="198" stroke="#7890D8" stroke-width="0.7" stroke-opacity="0.22"/>
  <!-- Bottom ribbon -->
  <line x1="78"  y1="595" x2="280" y2="628" stroke="#7890D8" stroke-width="0.7" stroke-opacity="0.22"/>
  <line x1="280" y1="628" x2="500" y2="645" stroke="#E08040" stroke-width="0.7" stroke-opacity="0.28"/>
  <line x1="500" y1="645" x2="705" y2="652" stroke="#7890D8" stroke-width="0.7" stroke-opacity="0.22"/>
  <line x1="705" y1="652" x2="905" y2="635" stroke="#E08040" stroke-width="0.7" stroke-opacity="0.28"/>
  <line x1="905" y1="635" x2="1105" y2="605" stroke="#7890D8" stroke-width="0.7" stroke-opacity="0.22"/>
  <!-- Left spine -->
  <line x1="18"  y1="148" x2="100" y2="42"  stroke="#E08040" stroke-width="0.6" stroke-opacity="0.22"/>
  <line x1="18"  y1="298" x2="18"  y2="148" stroke="#7890D8" stroke-width="0.6" stroke-opacity="0.22"/>
  <line x1="18"  y1="452" x2="18"  y2="298" stroke="#E08040" stroke-width="0.6" stroke-opacity="0.22"/>
  <line x1="78"  y1="595" x2="18"  y2="452" stroke="#7890D8" stroke-width="0.6" stroke-opacity="0.22"/>
  <!-- Right spine -->
  <line x1="1178" y1="198" x2="1178" y2="385" stroke="#E08040" stroke-width="0.6" stroke-opacity="0.22"/>
  <line x1="1178" y1="385" x2="1105" y2="605" stroke="#7890D8" stroke-width="0.6" stroke-opacity="0.22"/>
  <!-- Cross connections -->
  <line x1="310" y1="78"  x2="18"  y2="148" stroke="#7890D8" stroke-width="0.5" stroke-opacity="0.16"/>
  <line x1="310" y1="78"  x2="18"  y2="298" stroke="#E08040" stroke-width="0.5" stroke-opacity="0.14"/>
  <line x1="280" y1="628" x2="18"  y2="452" stroke="#7890D8" stroke-width="0.5" stroke-opacity="0.16"/>
  <line x1="925" y1="38"  x2="1178" y2="198" stroke="#E08040" stroke-width="0.5" stroke-opacity="0.16"/>
  <line x1="1105" y1="605" x2="1178" y2="385" stroke="#E08040" stroke-width="0.5" stroke-opacity="0.16"/>
  <line x1="905" y1="635" x2="1178" y2="385" stroke="#7890D8" stroke-width="0.5" stroke-opacity="0.14"/>

  <!-- ─── Neural network nodes ─── -->
  <!-- Each node: outer glow halo + bright core -->
  <g filter="url(#nodeGlow)">
    <!-- Orange nodes -->
    <circle cx="100"  cy="42"  r="9"  fill="#E08040" fill-opacity="0.18"/><circle cx="100"  cy="42"  r="3.5" fill="#E08040" fill-opacity="0.95"/>
    <circle cx="520"  cy="52"  r="9"  fill="#E08040" fill-opacity="0.18"/><circle cx="520"  cy="52"  r="3.5" fill="#E08040" fill-opacity="0.95"/>
    <circle cx="925"  cy="38"  r="11" fill="#E08040" fill-opacity="0.22"/><circle cx="925"  cy="38"  r="4.5" fill="#E08040" fill-opacity="0.98"/>
    <circle cx="1178" cy="198" r="13" fill="#E08040" fill-opacity="0.24"/><circle cx="1178" cy="198" r="5"   fill="#E08040" fill-opacity="0.98"/>
    <circle cx="1105" cy="605" r="11" fill="#E08040" fill-opacity="0.22"/><circle cx="1105" cy="605" r="4.5" fill="#E08040" fill-opacity="0.98"/>
    <circle cx="705"  cy="652" r="11" fill="#E08040" fill-opacity="0.22"/><circle cx="705"  cy="652" r="4.5" fill="#E08040" fill-opacity="0.98"/>
    <circle cx="280"  cy="628" r="11" fill="#E08040" fill-opacity="0.22"/><circle cx="280"  cy="628" r="4.5" fill="#E08040" fill-opacity="0.98"/>
    <circle cx="18"   cy="148" r="9"  fill="#E08040" fill-opacity="0.18"/><circle cx="18"   cy="148" r="3.5" fill="#E08040" fill-opacity="0.95"/>
    <circle cx="18"   cy="452" r="9"  fill="#E08040" fill-opacity="0.18"/><circle cx="18"   cy="452" r="3.5" fill="#E08040" fill-opacity="0.95"/>
    <!-- Blue/indigo nodes -->
    <circle cx="310"  cy="78"  r="9"  fill="#7890D8" fill-opacity="0.15"/><circle cx="310"  cy="78"  r="3.5" fill="#7890D8" fill-opacity="0.88"/>
    <circle cx="718"  cy="62"  r="9"  fill="#7890D8" fill-opacity="0.15"/><circle cx="718"  cy="62"  r="3.5" fill="#7890D8" fill-opacity="0.88"/>
    <circle cx="1105" cy="68"  r="9"  fill="#7890D8" fill-opacity="0.15"/><circle cx="1105" cy="68"  r="3.5" fill="#7890D8" fill-opacity="0.88"/>
    <circle cx="1178" cy="385" r="9"  fill="#7890D8" fill-opacity="0.15"/><circle cx="1178" cy="385" r="3.5" fill="#7890D8" fill-opacity="0.88"/>
    <circle cx="905"  cy="635" r="9"  fill="#7890D8" fill-opacity="0.15"/><circle cx="905"  cy="635" r="3.5" fill="#7890D8" fill-opacity="0.88"/>
    <circle cx="500"  cy="645" r="9"  fill="#7890D8" fill-opacity="0.15"/><circle cx="500"  cy="645" r="3.5" fill="#7890D8" fill-opacity="0.88"/>
    <circle cx="78"   cy="595" r="9"  fill="#7890D8" fill-opacity="0.15"/><circle cx="78"   cy="595" r="3.5" fill="#7890D8" fill-opacity="0.88"/>
    <circle cx="18"   cy="298" r="13" fill="#7890D8" fill-opacity="0.18"/><circle cx="18"   cy="298" r="5"   fill="#7890D8" fill-opacity="0.92"/>
  </g>

  <!-- ─── Left frosted-glass panel ─── -->
  <rect x="32" y="112" width="252" height="451" rx="16"
        fill="url(#panelGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- "6 DIMENSIONS" header -->
  <text x="58" y="157"
        font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="700" fill="#E08040" letter-spacing="2">6 DIMENSIONS</text>
  <line x1="58" y1="169" x2="262" y2="169" stroke="rgba(224,128,64,0.35)" stroke-width="1"/>

  <!-- Dimension items — spaced 62px apart, starting at y=210 -->
  <!-- Financial -->
  <circle cx="72" cy="210" r="4.5" fill="#E08040"/>
  <text x="90" y="216" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="15" fill="#EAD9BE">Financial</text>
  <line x1="58" y1="231" x2="262" y2="231" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Health -->
  <circle cx="72" cy="269" r="4.5" fill="#7890D8"/>
  <text x="90" y="275" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="15" fill="#EAD9BE">Health</text>
  <line x1="58" y1="290" x2="262" y2="290" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Skills -->
  <circle cx="72" cy="328" r="4.5" fill="#E08040"/>
  <text x="90" y="334" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="15" fill="#EAD9BE">Skills</text>
  <line x1="58" y1="349" x2="262" y2="349" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Mobility -->
  <circle cx="72" cy="387" r="4.5" fill="#7890D8"/>
  <text x="90" y="393" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="15" fill="#EAD9BE">Mobility</text>
  <line x1="58" y1="408" x2="262" y2="408" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Psychological (full word, sized to fit) -->
  <circle cx="72" cy="446" r="4.5" fill="#E08040"/>
  <text x="90" y="452" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="15" fill="#EAD9BE">Psychological</text>
  <line x1="58" y1="467" x2="262" y2="467" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Resources -->
  <circle cx="72" cy="505" r="4.5" fill="#7890D8"/>
  <text x="90" y="511" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="15" fill="#EAD9BE">Resources</text>

  <!-- ─── Brain + Arms icon (glow layer, blurred) ─── -->
  <!-- Glow pass: thicker strokes, low opacity, blurred -->
  <g transform="translate(420,33) scale(2)" opacity="0.35" filter="url(#iconGlow)">
    <path d="M26 161 C4 139,0 101,11 71 C19 53,38 41,56 34"
          stroke="#E08040" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M154 161 C176 139,180 101,169 71 C161 53,142 41,124 34"
          stroke="#E08040" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M90 26 C79 26,64 30,56 41 C49 53,49 71,56 83 C60 90,64 94,68 102 L90 102 L90 26 Z"
          fill="#E08040" fill-opacity="0.25" stroke="#E08040" stroke-width="10" stroke-linejoin="round"/>
    <path d="M90 26 C101 26,116 30,124 41 C131 53,131 71,124 83 C120 90,116 94,112 102 L90 102 L90 26 Z"
          fill="#E08040" fill-opacity="0.25" stroke="#E08040" stroke-width="10" stroke-linejoin="round"/>
    <line x1="90" y1="26" x2="90" y2="102" stroke="#E08040" stroke-width="9" stroke-linecap="round"/>
    <path d="M60 49 Q71 41,83 49"  stroke="#E08040" stroke-width="7.5" fill="none" stroke-linecap="round"/>
    <path d="M53 71 Q64 64,79 71"  stroke="#E08040" stroke-width="7.5" fill="none" stroke-linecap="round"/>
    <path d="M56 90 Q68 83,79 90"  stroke="#E08040" stroke-width="7"   fill="none" stroke-linecap="round"/>
    <path d="M120 49 Q109 41,97 49"  stroke="#E08040" stroke-width="7.5" fill="none" stroke-linecap="round"/>
    <path d="M127 71 Q116 64,101 71" stroke="#E08040" stroke-width="7.5" fill="none" stroke-linecap="round"/>
    <path d="M124 90 Q112 83,101 90" stroke="#E08040" stroke-width="7"   fill="none" stroke-linecap="round"/>
    <path d="M71 102 Q71 116,90 116 Q109 116,109 102"
          stroke="#E08040" stroke-width="10" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ─── Brain + Arms icon (main crisp layer) ─── -->
  <g transform="translate(420,33) scale(2)">
    <!-- Left arm — bicep swell pushes outward left -->
    <path d="M26 161 C4 139,0 101,11 71 C19 53,38 41,56 34"
          stroke="#E08040" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Right arm — mirror -->
    <path d="M154 161 C176 139,180 101,169 71 C161 53,142 41,124 34"
          stroke="#E08040" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Left hemisphere -->
    <path d="M90 26 C79 26,64 30,56 41 C49 53,49 71,56 83 C60 90,64 94,68 102 L90 102 L90 26 Z"
          fill="rgba(224,128,64,0.15)" stroke="#E08040" stroke-width="5" stroke-linejoin="round"/>
    <!-- Right hemisphere -->
    <path d="M90 26 C101 26,116 30,124 41 C131 53,131 71,124 83 C120 90,116 94,112 102 L90 102 L90 26 Z"
          fill="rgba(224,128,64,0.15)" stroke="#E08040" stroke-width="5" stroke-linejoin="round"/>
    <!-- Longitudinal fissure -->
    <line x1="90" y1="26" x2="90" y2="102" stroke="#E08040" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Left gyri -->
    <path d="M60 49 Q71 41,83 49"  stroke="#E08040" stroke-width="3.75" fill="none" stroke-linecap="round"/>
    <path d="M53 71 Q64 64,79 71"  stroke="#E08040" stroke-width="3.75" fill="none" stroke-linecap="round"/>
    <path d="M56 90 Q68 83,79 90"  stroke="#E08040" stroke-width="3.5"  fill="none" stroke-linecap="round"/>
    <!-- Right gyri -->
    <path d="M120 49 Q109 41,97 49"  stroke="#E08040" stroke-width="3.75" fill="none" stroke-linecap="round"/>
    <path d="M127 71 Q116 64,101 71" stroke="#E08040" stroke-width="3.75" fill="none" stroke-linecap="round"/>
    <path d="M124 90 Q112 83,101 90" stroke="#E08040" stroke-width="3.5"  fill="none" stroke-linecap="round"/>
    <!-- Brainstem -->
    <path d="M71 102 Q71 116,90 116 Q109 116,109 102"
          stroke="#E08040" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ─── RESILIUM wordmark ─── -->
  <text x="600" y="408"
        font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="68" font-weight="900" fill="#E08040"
        text-anchor="middle" letter-spacing="5">RESILIUM</text>

  <!-- ─── Tagline ─── -->
  <text x="600" y="450"
        font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="17" fill="rgba(234,217,190,0.72)"
        text-anchor="middle" letter-spacing="0.3">Know your readiness. Build your resilience.</text>

  <!-- ─── Phone mockup ─── -->
  <!-- Outer frame -->
  <rect x="870" y="112" width="232" height="451" rx="26"
        fill="#1A2238" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <!-- Notch/speaker bar -->
  <rect x="940" y="126" width="92" height="14" rx="7" fill="#0D1225"/>
  <!-- Screen area -->
  <rect x="882" y="148" width="208" height="378" rx="6" fill="url(#screenGrad)"/>

  <!-- Gauge: background track (full semicircle) -->
  <!-- Centre: (986, 320), radius 88 -->
  <!-- Track: M(986-88, 320) A 88 88 0 0 1 (986+88, 320) -->
  <!-- = M 898 320 A 88 88 0 0 1 1074 320 -->
  <path d="M 898 320 A 88 88 0 0 1 1074 320"
        fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="14" stroke-linecap="round"/>

  <!-- Gauge filled arc — 74% of 180° = 133.2° — sweeps clockwise from left to 74% point -->
  <!-- End angle from positive-x: 180° - 133.2° = 46.8° -->
  <!-- End point: x=986+88*cos(46.8°)=1046, y=320-88*sin(46.8°)=256 -->
  <!-- large-arc-flag=0 (133° < 180°), sweep-flag=1 (clockwise/upward in SVG) -->
  <path d="M 898 320 A 88 88 0 0 1 1046 256"
        fill="none" stroke="url(#gaugeGrad)" stroke-width="14" stroke-linecap="round"/>

  <!-- 74 / 100 label -->
  <text x="986" y="336"
        font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">74/100</text>

  <!-- Home bar hint -->
  <rect x="950" y="498" width="72" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
</svg>
